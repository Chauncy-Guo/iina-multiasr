name: Compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build plugin
        run: |
          bash bundle.sh

      - name: Verify dist contents
        run: |
          test -f dist/index.js
          test -f dist/global.js
          test -f dist/pref.html
          echo "dist/ contents:"
          ls -la dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: multiasr-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
